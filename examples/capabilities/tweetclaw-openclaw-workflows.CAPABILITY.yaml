# Example CAPABILITY.yaml - Skill type with external approval boundary
# Copy to ~/.wunderland/capabilities/ or set WUNDERLAND_CAPABILITY_DIRS
# The CapabilityManifestScanner will auto-discover and index this.

id: custom:tweetclaw-openclaw-workflows
kind: skill
name: tweetclaw-openclaw-workflows
displayName: TweetClaw OpenClaw Workflows
description: >
  Use when an agent needs approved X/Twitter automation through TweetClaw,
  including scrape tweets, search tweets, search tweet replies, follower export,
  user lookup, media upload or download, direct messages, monitor tweets,
  webhooks, giveaway draws, and reviewed post or reply workflows. Keep this
  capability behind an explicit approval boundary for every mode because read
  and monitor tasks still call external services, while draft and publish tasks
  can prepare or perform account actions.
category: communication
tags: [x, twitter, tweets, social-media, openclaw, agent-tools]
requiredSecrets: [XQUIK_API_KEY]
requiredTools: [tweetclaw]
hasSideEffects: true
inputSchema:
  type: object
  properties:
    task:
      type: string
      description: >
        Describe the approved job, such as "search tweets about a launch",
        "monitor replies for support", "draft a reply for review", or
        "publish an approved campaign post".
    mode:
      type: string
      description: >
        Select read or monitor for data collection, draft for reviewed content
        preparation, and publish only after explicit account-action approval.
      enum: [read, monitor, draft, publish]
      default: read
  required: [task]
